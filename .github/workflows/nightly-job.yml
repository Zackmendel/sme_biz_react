name: Nightly Job Trigger

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  # Allows manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Daily Reporting and Aggregation Job
        run: |
          curl -X POST "https://sme-biz-analyst-backend-xxxxxx.a.run.app/reports/trigger-daily" \
               -H "x-scheduler-token: ${{ secrets.SCHEDULER_API_TOKEN }}" \
               --fail --show-error
